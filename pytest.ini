[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:test-reports/coverage-html
    --cov-report=xml:test-reports/coverage.xml
    --junitxml=test-reports/junit-results.xml
    --html=test-reports/test-report.html
    --self-contained-html
log_cli = true
log_cli_level = INFO
log_file = test-reports/test-run.log
log_file_level = DEBUG
markers =
    unit: Unit tests — pure logic, no external dependencies
    integration: Integration tests — require database or file I/O
    functional: Functional tests — exercise a full feature flow with mocks
    smoke: Smoke tests — quick sanity checks for critical paths
asyncio_mode = auto
